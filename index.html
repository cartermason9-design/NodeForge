                node.data.mode === "conic" ? "" : "display:none;"
              }">
                <div class="field-label">Start Angle</div>
                <input class="num-input" data-field="conicAngle" type="number" value="${
                  node.data.conicAngle
                }">
              </div>
            </div>

            <div>
              <div class="field-label">Preview</div>
              <div class="color-preview" style="background:${escapeHtml(
                buildColorFill(node.data)
              )};"></div>
            </div>
          `;
        }

        if (node.type === "stroke") {
          body = `
            <div class="row">
              <div>
                <div class="field-label">Width</div>
                <input class="num-input" data-field="width" type="number" min="0" step="1" value="${
                  node.data.width
                }">
              </div>
              <div>
                <div class="field-label">Side</div>
                <select class="select-input" data-field="position">
                  <option value="outside" ${
                    node.data.position === "outside" ? "selected" : ""
                  }>Outside</option>
                  <option value="inside" ${
                    node.data.position === "inside" ? "selected" : ""
                  }>Inside</option>
                </select>
              </div>
            </div>
            ${renderFillControls("", "Stroke Fill", node.data, { solid: "#ffffff", end: "#b9c6e3" })}
            <div class="port-row">
              <div class="port-group">
                <div class="port stroke out" data-port-kind="out" data-port-role="stroke"></div>
                <div class="port-label">Output</div>
              </div>
              <div class="badge">STROKE</div>
            </div>
          `;
        }

        if (node.type === "textstroke") {
          body = `
            <div>
              <div class="field-label">Width</div>
              <input class="num-input" data-field="width" type="number" min="0" step="1" value="${
                node.data.width
              }">
            </div>
            ${renderFillControls("", "Text Stroke", node.data, { solid: "#1d2433", end: "#43516f" })}
            <div class="port-row">
              <div class="port-group">
                <div class="port textStroke out" data-port-kind="out" data-port-role="textStroke"></div>
                <div class="port-label">Output</div>
              </div>
              <div class="badge">TEXT STROKE</div>
            </div>
          `;
        }

        if (node.type === "shadow") {
          body = `
            <div>
              <div class="field-label">Shadow</div>
              <select class="select-input" data-field="mode">
                <option value="none" ${node.data.mode === "none" ? "selected" : ""}>None</option>
                <option value="custom" ${node.data.mode === "custom" ? "selected" : ""}>Custom</option>
              </select>
            </div>
            <div class="color-mode-block" style="${node.data.mode === "custom" ? "" : "display:none;"}">
              <div class="row">
                <div>
                  <div class="field-label">Offset X</div>
                  <input class="num-input" data-field="x" type="number" value="${node.data.x}">
                </div>
                <div>
                  <div class="field-label">Offset Y</div>
                  <input class="num-input" data-field="y" type="number" value="${node.data.y}">
                </div>
              </div>
              <div class="row">
                <div>
                  <div class="field-label">Blur</div>
                  <input class="num-input" data-field="blur" type="number" min="0" value="${node.data.blur}">
                </div>
                <div>
                  <div class="field-label">Spread</div>
                  <input class="num-input" data-field="spread" type="number" value="${node.data.spread}">
                </div>
              </div>
              <div>
                <div class="field-label">Color</div>
                <div class="color-picker-row">
                  <input class="text-input" data-field="color" type="text" value="${escapeHtml(node.data.color)}" placeholder="#1c2740">
                  <input class="color-wheel-input" data-field="colorPicker" type="color" value="${escapeHtml(
                    normalizeHex(node.data.color, "#1c2740")
                  )}" title="Open color picker">
                </div>
              </div>
            </div>
            <div class="port-row">
              <div class="port-group">
                <div class="port shadow out" data-port-kind="out" data-port-role="shadow"></div>
                <div class="port-label">Output</div>
              </div>
              <div class="badge">SHADOW</div>
            </div>
          `;
        }

        if (node.type === "radius") {
          const radiusValues = getRadiusNodeValues(node.data);
          body = `
            <div class="field-header-row">
              <div class="field-label" style="margin-bottom:0;">Corner Radius</div>
              <button class="node-icon-btn inline-icon-btn radius-link-btn" type="button" data-action="toggle-radius-link" title="${
                node.data.linked ? "Linked corners" : "Unlinked corners"
              }" aria-label="Toggle linked corner radius">
                ${
                  node.data.linked
                    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l1.41-1.41a5 5 0 0 0-7.07-7.07L10.6 5.3"/><path d="M14 11a5 5 0 0 0-7.07 0L5.52 12.4a5 5 0 0 0 7.07 7.07l.71-.71"/></svg>`
                    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a5 5 0 0 1 1.46-3.54l1.12-1.12a5 5 0 0 1 7.07 7.07l-1.12 1.12A5 5 0 0 1 14 17"/><path d="M15 12a5 5 0 0 1-1.46 3.54l-1.12 1.12a5 5 0 0 1-7.07-7.07l1.12-1.12A5 5 0 0 1 10 7"/></svg>`
                }
              </button>
            </div>
            <div class="color-mode-block" style="${node.data.linked ? "" : "display:none;"}">
              <div class="field-label">All Corners</div>
              <input class="num-input" data-field="all" type="number" min="0" value="${node.data.all}">
            </div>
            <div class="color-mode-block" style="${node.data.linked ? "display:none;" : ""}">
              <div class="row">
                <div>
                  <div class="field-label">Top Left</div>
                  <input class="num-input" data-field="tl" type="number" min="0" value="${radiusValues.tl}">
                </div>
                <div>
                  <div class="field-label">Top Right</div>
                  <input class="num-input" data-field="tr" type="number" min="0" value="${radiusValues.tr}">
                </div>
              </div>
              <div class="row">
                <div>
                  <div class="field-label">Bottom Right</div>
                  <input class="num-input" data-field="br" type="number" min="0" value="${radiusValues.br}">
                </div>
                <div>
                  <div class="field-label">Bottom Left</div>
                  <input class="num-input" data-field="bl" type="number" min="0" value="${radiusValues.bl}">
                </div>
              </div>
            </div>
            <div class="port-row">
              <div class="port-group">
                <div class="port radius out" data-port-kind="out" data-port-role="radius"></div>
                <div class="port-label">Output</div>
              </div>
              <div class="badge">RADIUS</div>
            </div>
          `;
        }

        el.innerHTML = `
          <div class="node-header">
            <div class="node-title-row">
              <span class="mini-dot dot-${node.type}"></span>
              <span>${title}</span>
            </div>
            <div class="node-header-actions">
              <span class="badge">${node.id.replace("node_", "#")}</span>
              <button class="node-icon-btn copy-node-btn" type="button" title="Copy node" aria-label="Copy node">
                ${getCopyIconSvg()}
              </button>
              <button class="node-icon-btn delete-node-btn" type="button" title="Delete node" aria-label="Delete node">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 6h18"/>
                  <path d="M8 6V4h8v2"/>
                  <path d="M19 6l-1 14H6L5 6"/>
                  <path d="M10 11v6M14 11v6"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="node-body">${body}</div>
        `;

        canvas.appendChild(el);

        const header = el.querySelector(".node-header");
        makeDraggable(el, header, node);

        const deleteBtn = el.querySelector(".delete-node-btn");
        deleteBtn?.addEventListener("click", (e) => {
          e.stopPropagation();
          removeNode(node.id);
        });

        const copyBtn = el.querySelector(".copy-node-btn");
        copyBtn?.addEventListener("click", (e) => {
          e.stopPropagation();
          copyNode(node.id);
        });

        const radiusLinkBtn = el.querySelector(".radius-link-btn");
        radiusLinkBtn?.addEventListener("click", (e) => {
          e.stopPropagation();
          if (node.type !== "radius" && node.type !== "buttonsc") {
            return;
          }
          if (node.type === "buttonsc") {
            if (node.data.radiusLinked) {
              const linkedValue = Math.max(0, Number(node.data.radius) || 0);
              node.data.radiusTL = linkedValue;
              node.data.radiusTR = linkedValue;
              node.data.radiusBR = linkedValue;
              node.data.radiusBL = linkedValue;
            }
            node.data.radiusLinked = !node.data.radiusLinked;
            if (node.data.radiusLinked) {
              const linkedValue = Math.max(0, Number(node.data.radiusTL) || 0);
              node.data.radius = linkedValue;
              node.data.radiusTL = linkedValue;
              node.data.radiusTR = linkedValue;
              node.data.radiusBR = linkedValue;
              node.data.radiusBL = linkedValue;
            }
            refreshNode(node.id);
            return;
          }
          if (node.data.linked) {
            const linkedValue = Math.max(0, Number(node.data.all) || 0);
            node.data.tl = linkedValue;
            node.data.tr = linkedValue;
            node.data.br = linkedValue;
            node.data.bl = linkedValue;
          }
          node.data.linked = !node.data.linked;
          if (node.data.linked) {
            const linkedValue = Math.max(0, Number(node.data.tl) || 0);
            node.data.all = linkedValue;
            node.data.tl = linkedValue;
            node.data.tr = linkedValue;
            node.data.br = linkedValue;
            node.data.bl = linkedValue;
          }
          refreshNode(node.id);
        });

        for (const input of el.querySelectorAll("input, select")) {
          input.addEventListener("input", () => {
            const field = input.dataset.field;
            const value =
              input.type === "number" ? Number(input.value) : input.value;

            const mappedField = field.endsWith("Picker")
              ? field.slice(0, -"Picker".length)
              : null;

            if (mappedField && Object.prototype.hasOwnProperty.call(node.data, mappedField)) {
              node.data[mappedField] = value;
              const textField = el.querySelector(
                `.text-input[data-field="${mappedField}"]`
              );
              if (textField) {
                textField.value = value;
              }
            } else {
              node.data[field] = value;
            }

            if (
              (node.type === "scale" && field === "mode") ||
              (node.type === "color" && field === "mode") ||
              (node.type === "background" && field === "mode") ||
              (node.type === "shadow" && field === "mode") ||
              (node.type === "stroke" && field === "mode") ||
              (node.type === "textstroke" && field === "mode") ||
              (node.type === "buttonsc" &&
                [
                  "scaleMode",
                  "buttonFillMode",
                  "strokeMode",
                  "shadowMode",
                ].includes(field))
            ) {
              refreshNode(node.id);
              return;
            }

            if (node.type === "color") {
              const nodeEl = canvas.querySelector(
                `.node[data-node-id="${node.id}"]`
              );
              const previewSwatch = nodeEl?.querySelector(".color-preview");
              const solidPicker = nodeEl?.querySelector(
                '.color-wheel-input[data-field="solidPicker"]'
              );
              const startPicker = nodeEl?.querySelector(
                '.color-wheel-input[data-field="startPicker"]'
              );
              const endPicker = nodeEl?.querySelector(
                '.color-wheel-input[data-field="endPicker"]'
              );
              if (previewSwatch) {
                previewSwatch.style.background = buildColorFill(node.data);
              }
              if (solidPicker) {
                solidPicker.value = normalizeHex(node.data.solid, "#2e7bf5");
              }
              if (startPicker) {
                startPicker.value = normalizeHex(node.data.start, "#2e7bf5");
              }
              if (endPicker) {
                endPicker.value = normalizeHex(node.data.end, "#215fc0");
              }
            }

            if (node.type === "textcolor") {
              const nodeEl = canvas.querySelector(
                `.node[data-node-id="${node.id}"]`
              );
              const previewSwatch = nodeEl?.querySelector(".color-preview");
              const picker = nodeEl?.querySelector(
                '.color-wheel-input[data-field="colorPicker"]'
              );
              const nextColor = normalizeHex(node.data.color, "#ffffff");
              if (previewSwatch) {
                previewSwatch.style.background = nextColor;
              }
              if (picker && picker.value !== nextColor) {
                picker.value = nextColor;
              }
            }

            if (node.type === "background") {
              const nodeEl = canvas.querySelector(
                `.node[data-node-id="${node.id}"]`
              );
              const previewSwatch = nodeEl?.querySelector(".color-preview");
              const solidPicker = nodeEl?.querySelector(
                '.color-wheel-input[data-field="solidPicker"]'
              );
              const startPicker = nodeEl?.querySelector(
                '.color-wheel-input[data-field="startPicker"]'
              );
              const endPicker = nodeEl?.querySelector(
                '.color-wheel-input[data-field="endPicker"]'
              );
              if (previewSwatch) {
                previewSwatch.style.background = buildColorFill(node.data);
              }
              if (solidPicker) {
                solidPicker.value = normalizeHex(node.data.solid, "#eef1f6");
              }
              if (startPicker) {
                startPicker.value = normalizeHex(node.data.start, "#eef1f6");
              }
              if (endPicker) {
                endPicker.value = normalizeHex(node.data.end, "#dce6f2");
              }
            }

            if ((node.type === "button" || node.type === "buttonsc") && field === "text") {
              updateLayerControls();
            }

            updatePreview();
            drawConnections();
          });
        }

        for (const port of el.querySelectorAll(".port")) {
          port.addEventListener("mousedown", (e) => {
            e.preventDefault();
            e.stopPropagation();
            handlePortMouseDown(node, port, e);
          });
        }
      }

      function refreshNode(nodeId) {
        const node = graph.nodes.find((n) => n.id === nodeId);
        if (!node) {
          return;
        }
        if (!isNodeVisible(node)) {
          updatePreview();
          drawConnections();
          updateLayerControls();
          return;
        }
        const old = canvas.querySelector(`.node[data-node-id="${nodeId}"]`);
        if (old) {
          old.remove();
        }
        renderNode(node);
        drawConnections();
        updatePreview();
        updateLayerControls();
      }

      function makeDraggable(el, handle, node) {
        let dragging = false;
        let startX = 0;
        let startY = 0;
        let originX = 0;
        let originY = 0;

        handle.addEventListener("mousedown", (e) => {
          if (e.target.closest(".port") || e.target.closest(".node-icon-btn")) {
            return;
          }

          dragging = true;
          startX = e.clientX;
          startY = e.clientY;
          originX = node.x;
          originY = node.y;
          document.body.style.cursor = "grabbing";
        });

        function move(e) {
          if (!dragging) {
            return;
          }

          node.x = originX + (e.clientX - startX);
          node.y = originY + (e.clientY - startY);
          el.style.left = node.x + "px";
          el.style.top = node.y + "px";
          drawConnections();
        }

        function up() {
          if (!dragging) {
            return;
          }

          dragging = false;
          document.body.style.cursor = "";
          drawConnections();
          updatePreview();
        }

        window.addEventListener("mousemove", move);
        window.addEventListener("mouseup", up);
      }

      function handlePortMouseDown(node, port, startEvent) {
        const kind = port.dataset.portKind;
        const role = port.dataset.portRole;

        if (kind !== "out") {
          return;
        }

        startEvent?.preventDefault();
        const rect = getPortCenter(port);
        activeWire = {
          fromNodeId: node.id,
          role,
          startX: rect.x,
          startY: rect.y,
          mouseX: rect.x,
          mouseY: rect.y,
        };
        document.body.classList.add("connecting-wire");

        drawConnections();

        function move(ev) {
          ev.preventDefault();
          const p = getCanvasPoint(ev.clientX, ev.clientY);
          activeWire.mouseX = p.x;
          activeWire.mouseY = p.y;
          drawConnections();
        }

        function up(ev) {
          window.removeEventListener("mousemove", move);
          window.removeEventListener("mouseup", up);
          document.body.classList.remove("connecting-wire");

          const target = document.elementFromPoint(ev.clientX, ev.clientY);

          if (target && target.classList.contains("port")) {
            const inKind = target.dataset.portKind;
            const inRole = target.dataset.portRole;
            const targetNodeEl = target.closest(".node");

            if (inKind === "in" && inRole === role && targetNodeEl) {
              connectNodes(node.id, targetNodeEl.dataset.nodeId, role);
            }
          }

          activeWire = null;
          drawConnections();
        }

        window.addEventListener("mousemove", move);
        window.addEventListener("mouseup", up);
      }

      function connectNodes(fromNodeId, toNodeId, role) {
        const from = graph.nodes.find((n) => n.id === fromNodeId);
        const to = graph.nodes.find((n) => n.id === toNodeId);

        if (!from || !to) {
          return;
        }

        if (to.type !== "button") {
          showStatus("Only connect into the Button node");
          return;
        }

        graph.connections = graph.connections.filter(
          (c) => !(c.toNodeId === toNodeId && c.role === role)
        );

        graph.connections.push({
          fromNodeId,
          toNodeId,
          role,
        });

        if (role === "position") to.data.positionNodeId = fromNodeId;
        if (role === "scale") to.data.scaleNodeId = fromNodeId;
        if (role === "color") to.data.colorNodeId = fromNodeId;
        if (role === "textColor") to.data.textColorNodeId = fromNodeId;
        if (role === "stroke") to.data.strokeNodeId = fromNodeId;
        if (role === "textStroke") to.data.textStrokeNodeId = fromNodeId;
        if (role === "shadow") to.data.shadowNodeId = fromNodeId;
        if (role === "radius") to.data.radiusNodeId = fromNodeId;

        showStatus(`${role.charAt(0).toUpperCase() + role.slice(1)} connected`);
        drawConnections();
        updatePreview();
      }

      function drawConnections() {
        const paths = [];

        for (const c of graph.connections) {
          const fromNode = graph.nodes.find((n) => n.id === c.fromNodeId);
          const toNode = graph.nodes.find((n) => n.id === c.toNodeId);
          if (!fromNode || !toNode || !isNodeVisible(fromNode) || !isNodeVisible(toNode)) {
            continue;
          }

          const fromPort = getPortElement(c.fromNodeId, "out", c.role);
          const toPort = getPortElement(c.toNodeId, "in", c.role);

          if (!fromPort || !toPort) {
            continue;
          }

          const a = getPortCenter(fromPort);
          const b = getPortCenter(toPort);
          paths.push(svgPath(a.x, a.y, b.x, b.y, roleColor(c.role), 3));
        }

        if (activeWire) {
          paths.push(
            svgPath(
              activeWire.startX,
              activeWire.startY,
              activeWire.mouseX,
              activeWire.mouseY,
              roleColor(activeWire.role),
              3,
              true
            )
          );
        }

        connectionsSvg.innerHTML = paths.join("");
      }

      function roleColor(role) {
        if (role === "position") return "#d48b42";
        if (role === "scale") return "#8971ff";
        if (role === "color") return "#d85f95";
        if (role === "textColor") return "#59d0d8";
        if (role === "stroke") return "#f0c36a";
        if (role === "textStroke") return "#76c7ff";
        if (role === "shadow") return "#8a93b8";
        if (role === "radius") return "#9ae27d";
        return "#85b0ff";
      }

      function svgPath(x1, y1, x2, y2, color, width, dashed = false) {
        const dx = Math.max(80, Math.abs(x2 - x1) * 0.45);
        const d = `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${
          x2 - dx
        } ${y2}, ${x2} ${y2}`;

        return `
          <path d="${d}" fill="none" stroke="rgba(0,0,0,.35)" stroke-width="${
          width + 3
        }" stroke-linecap="round"/>
          <path d="${d}" fill="none" stroke="${color}" stroke-width="${width}" stroke-linecap="round" ${
          dashed ? 'stroke-dasharray="8 7"' : ""
        }/>
        `;
      }

      function getPortElement(nodeId, kind, role) {
        const nodeEl = canvas.querySelector(`.node[data-node-id="${nodeId}"]`);
        if (!nodeEl) {
          return null;
        }

        return nodeEl.querySelector(
          `.port[data-port-kind="${kind}"][data-port-role="${role}"]`
        );
      }

      function getPortCenter(port) {
        const canvasRect = canvas.getBoundingClientRect();
        const r = port.getBoundingClientRect();

        return {
          x: r.left - canvasRect.left + r.width / 2,
          y: r.top - canvasRect.top + r.height / 2,
        };
      }

      function getCanvasPoint(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();

        return {
          x: clientX - rect.left,
          y: clientY - rect.top,
        };
      }

      function getButtonNodes() {
        return graph.nodes.filter((n) => isButtonRootType(n.type));
      }

      function getLatestNodeByType(type) {
        const matches = graph.nodes.filter((n) => n.type === type);
        return matches.length ? matches[matches.length - 1] : null;
      }

      function getConnectedNode(buttonNode, role) {
        const conn = graph.connections.find(
          (c) => c.toNodeId === buttonNode.id && c.role === role
        );

        if (!conn) {
          return null;
        }

        return graph.nodes.find((n) => n.id === conn.fromNodeId) || null;
      }

      function getInteractionNode(layerId, interactionKind, type) {
        if (!layerId || !interactionKind) {
          return null;
        }
        const matches = graph.nodes.filter(
          (n) =>
            n.layerId === layerId &&
            n.interactionKind === interactionKind &&
            n.type === type
        );
        return matches.length ? matches[matches.length - 1] : null;
      }

      function normalizeHex(value, fallback) {
        const raw = String(value || "").trim();
        if (/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(raw)) {
          return raw;
        }
        return fallback;
      }

      function radialPositionCss(position) {
        if (position === "top") return "center top";
        if (position === "bottom") return "center bottom";
        if (position === "left") return "left center";
        if (position === "right") return "right center";
        return "center center";
      }

      function buildColorFill(colorData) {
        if (!colorData) {
          return "linear-gradient(#2e7bf5,#215fc0)";
        }

        const mode = colorData.mode || "solid";
        const solid = normalizeHex(colorData.solid, "#2e7bf5");
        const start = normalizeHex(colorData.start, "#2e7bf5");
        const end = normalizeHex(colorData.end, "#215fc0");

        if (mode === "solid") {
          return solid;
        }

        if (mode === "linear") {
          const angle = Number.isFinite(Number(colorData.angle))
            ? Number(colorData.angle)
            : 180;
          return `linear-gradient(${angle}deg, ${start}, ${end})`;
        }

        if (mode === "radial") {
          const shape =
            colorData.radialShape === "ellipse" ? "ellipse" : "circle";
          const position = radialPositionCss(colorData.radialPosition);
          return `radial-gradient(${shape} at ${position}, ${start}, ${end})`;
        }

        if (mode === "conic") {
          const angle = Number.isFinite(Number(colorData.conicAngle))
            ? Number(colorData.conicAngle)
            : 0;
          return `conic-gradient(from ${angle}deg, ${start}, ${end})`;
        }

        return solid;
      }

      function removeNode(nodeId) {
        const node = graph.nodes.find((n) => n.id === nodeId);
        if (!node) {
          return;
        }

        if (isButtonRootType(node.type) && node.layerId) {
          graph.nodes = graph.nodes.filter((n) => n.layerId !== node.layerId);
          graph.connections = graph.connections.filter((c) => {
            const fromNode = graph.nodes.find((n) => n.id === c.fromNodeId);
            const toNode = graph.nodes.find((n) => n.id === c.toNodeId);
            return fromNode && toNode;
          });
          const layerIndex = layers.findIndex((layer) => layer.id === node.layerId);
          if (layerIndex >= 0) {
            layers.splice(layerIndex, 1);
          }
          if (activeLayerId === node.layerId) {
            activeLayerId = layers[0]?.id || null;
            activeInteractionKind = null;
          }
        } else {
          graph.nodes = graph.nodes.filter((n) => n.id !== nodeId);
          graph.connections = graph.connections.filter(
            (c) => c.fromNodeId !== nodeId && c.toNodeId !== nodeId
          );
          if (node.type === "background" && activeLayerId === "background") {
            activeLayerId = layers[0]?.id || null;
            activeInteractionKind = null;
          }
        }

        for (const buttonNode of graph.nodes.filter((n) => n.type === "button")) {
          if (buttonNode.data.positionNodeId === nodeId) buttonNode.data.positionNodeId = null;
          if (buttonNode.data.scaleNodeId === nodeId) buttonNode.data.scaleNodeId = null;
          if (buttonNode.data.colorNodeId === nodeId) buttonNode.data.colorNodeId = null;
          if (buttonNode.data.textColorNodeId === nodeId) buttonNode.data.textColorNodeId = null;
          if (buttonNode.data.strokeNodeId === nodeId) buttonNode.data.strokeNodeId = null;
          if (buttonNode.data.textStrokeNodeId === nodeId) buttonNode.data.textStrokeNodeId = null;
          if (buttonNode.data.shadowNodeId === nodeId) buttonNode.data.shadowNodeId = null;
          if (buttonNode.data.radiusNodeId === nodeId) buttonNode.data.radiusNodeId = null;
        }

        updateLayerControls();
        rerenderCanvas();
        updatePreview();
        showStatus(`${node.type} deleted`);
      }

      function updatePreview() {
        const buttonNodes = getButtonNodes();
        const backgroundNode = getLatestNodeByType("background");
        const previewBackground = buildColorFill(backgroundNode ? backgroundNode.data : null);

        preview.style.background = previewBackground;

        if (!buttonNodes.length) {
          preview.innerHTML = `<div class="preview-empty">No Button node found.</div>`;
          return;
        }

        const buttonMarkup = buttonNodes
          .map((buttonNode) => {
            const isSimpleButton = buttonNode.type === "buttonsc";
            const positionNode = isSimpleButton
              ? { data: { x: buttonNode.data.x, y: buttonNode.data.y, align: buttonNode.data.align } }
              : getConnectedNode(buttonNode, "position");
            const scaleNode = isSimpleButton
              ? {
                  data: {
                    mode: buttonNode.data.scaleMode,
                    target: buttonNode.data.scaleTarget,
                    scale: buttonNode.data.scale,
                    width: buttonNode.data.width,
                    height: buttonNode.data.height,
                  },
                }
              : getConnectedNode(buttonNode, "scale");
            const colorNode = isSimpleButton
              ? {
                  data: {
                    mode: buttonNode.data.buttonFillMode,
                    solid: buttonNode.data.buttonFillSolid,
                    start: buttonNode.data.buttonFillStart,
                    end: buttonNode.data.buttonFillEnd,
                    angle: buttonNode.data.buttonFillAngle,
                    radialShape: buttonNode.data.buttonFillRadialShape,
                    radialPosition: buttonNode.data.buttonFillRadialPosition,
                    conicAngle: buttonNode.data.buttonFillConicAngle,
                  },
                }
              : getConnectedNode(buttonNode, "color");
            const textColorNode = isSimpleButton
              ? { data: { color: buttonNode.data.textColor } }
              : getConnectedNode(buttonNode, "textColor");
            const strokeNode = isSimpleButton
              ? {
                  data: {
                    width: buttonNode.data.strokeWidth,
                    position: buttonNode.data.strokePosition,
                    mode: buttonNode.data.strokeMode,
                    solid: buttonNode.data.strokeSolid,
                    start: buttonNode.data.strokeStart,
                    end: buttonNode.data.strokeEnd,
                    angle: buttonNode.data.strokeAngle,
                    radialShape: buttonNode.data.strokeRadialShape,
                    radialPosition: buttonNode.data.strokeRadialPosition,
                    conicAngle: buttonNode.data.strokeConicAngle,
                  },
                }
              : getConnectedNode(buttonNode, "stroke");
            const textStrokeNode = getConnectedNode(buttonNode, "textStroke");
            const shadowNode = isSimpleButton
              ? {
                  data: {
                    mode: buttonNode.data.shadowMode,
                    x: buttonNode.data.shadowX,
                    y: buttonNode.data.shadowY,
                    blur: buttonNode.data.shadowBlur,
                    spread: buttonNode.data.shadowSpread,
                    color: buttonNode.data.shadowColor,
                  },
                }
              : getConnectedNode(buttonNode, "shadow");
            const radiusNode = isSimpleButton
              ? {
                  data: {
                    linked: buttonNode.data.radiusLinked,
                    all: buttonNode.data.radius,
                    tl: buttonNode.data.radiusTL,
                    tr: buttonNode.data.radiusTR,
                    br: buttonNode.data.radiusBR,
                    bl: buttonNode.data.radiusBL,
                  },
                }
              : getConnectedNode(buttonNode, "radius");
            const hoverOverrides = {
              positionNode: getInteractionNode(buttonNode.layerId, "hover", "position"),
              scaleNode: getInteractionNode(buttonNode.layerId, "hover", "scale"),
              colorNode: getInteractionNode(buttonNode.layerId, "hover", "color"),
              textColorNode: getInteractionNode(buttonNode.layerId, "hover", "textcolor"),
              strokeNode: getInteractionNode(buttonNode.layerId, "hover", "stroke"),
              textStrokeNode: getInteractionNode(buttonNode.layerId, "hover", "textstroke"),
              shadowNode: getInteractionNode(buttonNode.layerId, "hover", "shadow"),
              radiusNode: getInteractionNode(buttonNode.layerId, "hover", "radius"),
            };
            const clickOverrides = {
              positionNode: getInteractionNode(buttonNode.layerId, "click", "position"),
              scaleNode: getInteractionNode(buttonNode.layerId, "click", "scale"),
              colorNode: getInteractionNode(buttonNode.layerId, "click", "color"),
              textColorNode: getInteractionNode(buttonNode.layerId, "click", "textcolor"),
              strokeNode: getInteractionNode(buttonNode.layerId, "click", "stroke"),
              textStrokeNode: getInteractionNode(buttonNode.layerId, "click", "textstroke"),
              shadowNode: getInteractionNode(buttonNode.layerId, "click", "shadow"),
              radiusNode: getInteractionNode(buttonNode.layerId, "click", "radius"),
            };

            function buildButtonVisualState(overrides = {}) {
              const resolvedPositionNode = overrides.positionNode || positionNode;
              const resolvedScaleNode = overrides.scaleNode || scaleNode;
              const resolvedColorNode = overrides.colorNode || colorNode;
              const resolvedTextColorNode = overrides.textColorNode || textColorNode;
              const resolvedStrokeNode = overrides.strokeNode || strokeNode;
              const resolvedTextStrokeNode = overrides.textStrokeNode || textStrokeNode;
              const resolvedShadowNode = overrides.shadowNode || shadowNode;
              const resolvedRadiusNode = overrides.radiusNode || radiusNode;

              let leftStyle = "120px";
              let topStyle = "90px";
              let transform = "";
              let width = 140;
              let height = 44;
              let fontSize = 15;
              const buttonFill = buildColorFill(resolvedColorNode ? resolvedColorNode.data : null);
              const textColor = normalizeHex(
                resolvedTextColorNode ? resolvedTextColorNode.data.color : "#ffffff",
                "#ffffff"
              );
              const strokeWidth = Math.max(0, Number(resolvedStrokeNode?.data.width) || 0);
              const strokeInside = resolvedStrokeNode?.data.position === "inside";
              const strokeFill = buildColorFill(
                resolvedStrokeNode ? resolvedStrokeNode.data : { mode: "solid", solid: "#ffffff" }
              );
              const radii = resolvedRadiusNode
                ? getRadiusNodeValues(resolvedRadiusNode.data)
                : { tl: 8, tr: 8, br: 8, bl: 8 };
              const shadowCss = buildShadowCss(resolvedShadowNode ? resolvedShadowNode.data : null);

              if (resolvedPositionNode) {
                topStyle = `${resolvedPositionNode.data.y}px`;

                if (resolvedPositionNode.data.align === "left") {
                  leftStyle = `${resolvedPositionNode.data.x}px`;
                } else if (resolvedPositionNode.data.align === "center") {
                  leftStyle = "50%";
                  transform += ` translateX(calc(-50% + ${resolvedPositionNode.data.x}px))`;
                } else if (resolvedPositionNode.data.align === "right") {
                  leftStyle = `calc(100% - ${resolvedPositionNode.data.x}px)`;
                  transform += ` translateX(-100%)`;
                }
              }

              if (resolvedScaleNode) {
                if (resolvedScaleNode.data.target === "text") {
                  if (resolvedScaleNode.data.mode === "scale") {
                    const s = Number(resolvedScaleNode.data.scale) || 1;
                    fontSize = Math.max(12, Math.min(72, 15 * s));
                  } else {
                    fontSize = Math.max(
                      12,
                      Math.min(72, Number(resolvedScaleNode.data.height) || 44)
                    );
                  }
                } else {
                  if (resolvedScaleNode.data.mode === "scale") {
                    const s = Number(resolvedScaleNode.data.scale) || 1;
                    width = 140 * s;
                    height = 44 * s;
                  } else {
                    width = Number(resolvedScaleNode.data.width) || 140;
                    height = Number(resolvedScaleNode.data.height) || 44;
                  }
                }
              }

              if (!resolvedScaleNode || resolvedScaleNode.data.target !== "text") {
                fontSize = Math.max(12, Math.min(20, height * 0.34));
              }
              const outerRadii = strokeWidth && !strokeInside
                ? outsetRadiusValues(radii, strokeWidth)
                : radii;
              const innerRadii = strokeWidth && strokeInside
                ? insetRadiusValues(radii, strokeWidth)
                : radii;
              const wrapperWidth = strokeWidth && !strokeInside ? width + strokeWidth * 2 : width;
              const wrapperHeight = strokeWidth && !strokeInside ? height + strokeWidth * 2 : height;
              const innerWidth = strokeWidth && strokeInside ? Math.max(0, width - strokeWidth * 2) : width;
              const innerHeight = strokeWidth && strokeInside ? Math.max(0, height - strokeWidth * 2) : height;
              const offsetMargin = strokeWidth && !strokeInside ? -strokeWidth : 0;
              const labelSvg = renderButtonLabelSvg(
                buttonNode,
                resolvedTextStrokeNode ? resolvedTextStrokeNode.data : { width: 0, mode: "solid", solid: "#1d2433" },
                innerWidth || width,
                innerHeight || height,
                fontSize,
                textColor
              );

              return {
                leftStyle,
                topStyle,
                transform,
                wrapperWidth,
                wrapperHeight,
                offsetMargin,
                strokeWidth,
                outerRadii,
                strokeFill,
                shadowCss,
                innerWidth,
                innerHeight,
                innerRadii,
                buttonFill,
                labelSvg,
              };
            }

            const baseState = buildButtonVisualState();
            const hoverState = buildButtonVisualState(hoverOverrides);
            const clickState = buildButtonVisualState(clickOverrides);

            return `
              <div
                class="preview-btn-shell"
                data-button-layer-id="${buttonNode.layerId}"
                data-base-state='${escapeHtml(JSON.stringify(baseState))}'
                data-hover-state='${escapeHtml(JSON.stringify(hoverState))}'
                data-click-state='${escapeHtml(JSON.stringify(clickState))}'
                style="
                  left:${baseState.leftStyle};
                  top:${baseState.topStyle};
                  width:${baseState.wrapperWidth}px;
                  height:${baseState.wrapperHeight}px;
                  transform:${baseState.transform || "none"};
                  position:absolute;
                  margin-left:${baseState.offsetMargin}px;
                  margin-top:${baseState.offsetMargin}px;
                  padding:${baseState.strokeWidth > 0 ? baseState.strokeWidth : 0}px;
                  border-radius:${radiusCss(baseState.outerRadii)};
                  background:${baseState.strokeWidth > 0 ? baseState.strokeFill : "transparent"};
                  box-shadow:${baseState.shadowCss};
                "
              >
                <div
                  class="preview-btn"
                  style="
                    width:${baseState.innerWidth}px;
                    height:${baseState.innerHeight}px;
                    border-radius:${radiusCss(baseState.innerRadii)};
                    background:${baseState.buttonFill};
                    display:flex;
                    align-items:center;
                    justify-content:center;
                    overflow:hidden;
                  "
                >
                  <div class="preview-btn-label">${baseState.labelSvg}</div>
                </div>
              </div>
            `;
          })
          .join("");

        preview.innerHTML = buttonMarkup;

        for (const shell of preview.querySelectorAll(".preview-btn-shell")) {
          const inner = shell.querySelector(".preview-btn");
          const label = shell.querySelector(".preview-btn-label");
          const baseState = JSON.parse(shell.dataset.baseState);
          const hoverState = JSON.parse(shell.dataset.hoverState);
          const clickState = JSON.parse(shell.dataset.clickState);

          const applyState = (state) => {
            shell.style.left = state.leftStyle;
            shell.style.top = state.topStyle;
            shell.style.width = `${state.wrapperWidth}px`;
            shell.style.height = `${state.wrapperHeight}px`;
            shell.style.transform = state.transform || "none";
            shell.style.marginLeft = `${state.offsetMargin}px`;
            shell.style.marginTop = `${state.offsetMargin}px`;
            shell.style.padding = `${state.strokeWidth > 0 ? state.strokeWidth : 0}px`;
            shell.style.borderRadius = radiusCss(state.outerRadii);
            shell.style.background = state.strokeWidth > 0 ? state.strokeFill : "transparent";
            shell.style.boxShadow = state.shadowCss;

            inner.style.width = `${state.innerWidth}px`;
            inner.style.height = `${state.innerHeight}px`;
            inner.style.borderRadius = radiusCss(state.innerRadii);
            inner.style.background = state.buttonFill;
            label.innerHTML = state.labelSvg;
          };

          let clickTimer = null;
          shell.addEventListener("mouseenter", () => {
            applyState(hoverState);
          });
          shell.addEventListener("mouseleave", () => {
            if (clickTimer) {
              clearTimeout(clickTimer);
              clickTimer = null;
            }
            applyState(baseState);
          });
          shell.addEventListener("click", () => {
            applyState(clickState);
            if (clickTimer) {
              clearTimeout(clickTimer);
            }
            clickTimer = setTimeout(() => {
              applyState(baseState);
              clickTimer = null;
            }, 180);
          });
        }
      }

      function nextSpawnPosition(type) {
        const typeCount = graph.nodes.filter(
          (n) =>
            n.type === type &&
            (
              type === "background" ||
              isButtonRootType(type) ||
              (
                n.layerId === activeLayerId &&
                (n.interactionKind || null) === (activeInteractionKind || null)
              )
            )
        ).length;
        const base = {
          button: { x: 340, y: 160 },
          buttonsc: { x: 340, y: 160 },
          position: { x: 70, y: 110 },
          scale: { x: 70, y: 330 },
          color: { x: 70, y: 540 },
          textcolor: { x: 70, y: 760 },
          stroke: { x: 70, y: 980 },
          textstroke: { x: 70, y: 1180 },
          shadow: { x: 340, y: 980 },
          radius: { x: 340, y: 1180 },
          background: { x: 340, y: 160 },
        }[type] || { x: 120, y: 120 };

        const wrap = document.getElementById("canvas-wrap");
        const maxX = Math.max(20, wrap.clientWidth - 260);
        const maxY = Math.max(20, wrap.clientHeight - 360);
        const nextX = base.x + typeCount * 30;
        const nextY = base.y + typeCount * 30;

        return {
          x: Math.min(nextX, maxX),
          y: Math.min(nextY, maxY),
        };
      }

      function setupSidebar() {
        for (const item of document.querySelectorAll(".node-list-item")) {
          item.addEventListener("click", () => {
            const type = item.dataset.nodeType;
            const spawnPos = nextSpawnPosition(type);

            if (isButtonRootType(type)) {
              const layer = createLayer();
              activeLayerId = layer.id;
              activeInteractionKind = null;
              updateLayerControls();
              makeNode(type, spawnPos.x, spawnPos.y, {}, layer.id, null);
              rerenderCanvas();
              showStatus(`${type === "buttonsc" ? "Button SC" : layer.name} created`);
              return;
            }

            if (activeInteractionKind && (isButtonRootType(type) || type === "background")) {
              showStatus("Use style nodes inside hover/click layers");
              return;
            }

            if (type !== "background" && !activeLayerId) {
              showStatus("Add a Button first to create a layer");
              return;
            }

            if (type === "background") {
              activeLayerId = "background";
              activeInteractionKind = null;
            }

            makeNode(
              type,
              spawnPos.x,
              spawnPos.y,
              {},
              type === "background" ? null : activeLayerId,
              type === "background" ? null : activeInteractionKind
            );
            updateLayerControls();
            rerenderCanvas();
          });
        }

        layerList.addEventListener("click", (e) => {
          const copyBtn = e.target.closest("[data-copy-layer-id]");
          if (copyBtn) {
            e.stopPropagation();
            duplicateLayer(copyBtn.dataset.copyLayerId);
            return;
          }
          const item = e.target.closest("[data-layer-id]");
          if (!item) {
            return;
          }
          setActiveLayer(
            item.dataset.layerId,
            item.dataset.interactionKind || null
          );
        });

        layerList.addEventListener("keydown", (e) => {
          if (e.key !== "Enter" && e.key !== " ") {
            return;
          }
          const item = e.target.closest("[data-layer-id]");
          if (!item) {
            return;
          }
          e.preventDefault();
          setActiveLayer(
            item.dataset.layerId,
            item.dataset.interactionKind || null
          );
        });
      }

      function resetGraph() {
        graph.nodes.length = 0;
        graph.connections.length = 0;
        nodeIdCounter = 1;
        layerIdCounter = 1;
        layers.length = 0;
        activeLayerId = null;
        copiedNodePayload = null;

        canvas.querySelectorAll(".node").forEach((n) => n.remove());
        connectionsSvg.innerHTML = "";

        updateLayerControls();
        drawConnections();
        updatePreview();
        showStatus("Canvas cleared");
      }

      document.getElementById("resetBtn").addEventListener("click", resetGraph);

      document.getElementById("centerBtn").addEventListener("click", () => {
        const wrap = document.getElementById("canvas-wrap");
        wrap.scrollLeft = 0;
        wrap.scrollTop = 0;
        showStatus("Centered");
      });

      window.addEventListener("keydown", (e) => {
        const isPaste = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "v";
        if (!isPaste) {
          return;
        }

        const target = e.target;
        if (
          target instanceof HTMLInputElement ||
          target instanceof HTMLTextAreaElement ||
          target instanceof HTMLSelectElement ||
          target?.isContentEditable
        ) {
          return;
        }

        e.preventDefault();
        pasteCopiedNode();
      });

      resetGraph();
      setupSidebar();
    </script>
  </body>
</html>
